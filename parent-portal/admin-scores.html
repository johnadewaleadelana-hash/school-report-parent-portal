<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Manage Scores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .score-input {
            width: 70px;
            text-align: center;
            font-size: 1rem;
            padding: 6px 4px;
        }
        .score-input:focus {
            background-color: #e8f4f8;
            border-color: #1a73e8;
        }
        .score-input.ca { background-color: #f8f9fa; }
        .score-input.exam { background-color: #e9ecef; }
        .grade-badge { 
            font-weight: 700; 
            padding: 4px 10px; 
            border-radius: 4px;
            display: inline-block;
            min-width: 32px;
            text-align: center;
        }
        .saved-indicator {
            display: none;
            color: #28a745;
            font-size: 0.9rem;
        }
        .saved-indicator.show {
            display: inline;
            animation: fadeIn 0.5s;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .auto-save-status {
            font-size: 0.85rem;
            color: #6c757d;
        }
        .summary-card {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .summary-card .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="admin-dashboard.html">
                <i class="fas fa-school"></i> Admin Portal
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <span class="nav-link text-light">
                            <i class="fas fa-edit"></i> Manage Scores
                        </span>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="adminLogout()">
                            <i class="fas fa-sign-out-alt"></i> Logout
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- Page Header -->
        <div class="row mb-4">
            <div class="col-md-8">
                <h2><i class="fas fa-edit"></i> Manage Scores</h2>
                <p class="text-muted">Enter and manage student scores</p>
            </div>
            <div class="col-md-4 text-end">
                <button class="btn btn-success" onclick="saveAllScores()">
                    <i class="fas fa-save"></i> Save All
                </button>
                <button class="btn btn-warning" onclick="copyFromPrevious()">
                    <i class="fas fa-copy"></i> Copy from Previous
                </button>
            </div>
        </div>

        <!-- Selection Filters -->
        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <div class="row">
                    <div class="col-md-4">
                        <label class="form-label">Class *</label>
                        <select class="form-select" id="scoreClass" onchange="loadStudentsAndSubjects()">
                            <option value="">Select Class...</option>
                            <option value="Nursery A">Nursery A</option>
                            <option value="Nursery B">Nursery B</option>
                            <option value="Year 1">Year 1</option>
                            <option value="Year 2">Year 2</option>
                            <option value="Year 3">Year 3</option>
                            <option value="Year 4">Year 4</option>
                            <option value="Year 5">Year 5</option>
                            <option value="Year 6">Year 6</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Subject *</label>
                        <select class="form-select" id="scoreSubject" onchange="loadScores()">
                            <option value="">Select Subject...</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Term</label>
                        <select class="form-select" id="scoreTerm" onchange="loadScores()">
                            <option value="1">Term 1</option>
                            <option value="2">Term 2</option>
                            <option value="3" selected>Term 3</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <!-- Summary Stats -->
        <div class="row mb-3" id="summaryStats" style="display:none;">
            <div class="col-md-3">
                <div class="summary-card">
                    <small class="text-muted">Students</small>
                    <div class="stat-value" id="totalStudentsStat">0</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="summary-card">
                    <small class="text-muted">Scores Entered</small>
                    <div class="stat-value" id="scoresEnteredStat">0%</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="summary-card">
                    <small class="text-muted">Class Average</small>
                    <div class="stat-value" id="classAverageStat">0.0</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="summary-card">
                    <small class="text-muted">Auto-Save Status</small>
                    <div class="stat-value" id="autoSaveStatus" style="font-size:1rem;">
                        <span class="saved-indicator show" id="savedIndicator">
                            <i class="fas fa-check-circle"></i> Saved
                        </span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Scores Table -->
        <div class="card shadow-sm">
            <div class="card-body">
                <div id="scoresContainer">
                    <div class="text-center py-5 text-muted">
                        <i class="fas fa-edit fa-3x mb-3"></i>
                        <p>Select a class and subject to enter scores</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 9999;">
        <div id="toastMessage" class="toast align-items-center text-white border-0" role="alert">
            <div class="d-flex">
                <div class="toast-body" id="toastBody"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/parent-api.js"></script>
    <script src="js/admin-scores.js"></script>
</body>
</html>
