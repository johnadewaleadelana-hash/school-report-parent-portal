<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="fas fa-school"></i> Admin Portal
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <span class="nav-link text-light">
                            <i class="fas fa-user-shield"></i> Admin
                        </span>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="adminLogout()">
                            <i class="fas fa-sign-out-alt"></i> Logout
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    
    <div class="container mt-4">
        <!-- Dashboard Header -->
        <div class="row mb-4">
            <div class="col-12">
                <h1><i class="fas fa-chart-line"></i> Dashboard</h1>
                <p class="text-muted">Welcome to the Admin Dashboard</p>
            </div>
        </div>
        
        <!-- Statistics Cards -->
        <div class="row">
            <div class="col-md-3">
                <div class="card text-white bg-primary mb-3">
                    <div class="card-body">
                        <h6 class="card-title"><i class="fas fa-users"></i> Students</h6>
                        <h2 id="totalStudents">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-white bg-success mb-3">
                    <div class="card-body">
                        <h6 class="card-title"><i class="fas fa-chalkboard-teacher"></i> Teachers</h6>
                        <h2 id="totalTeachers">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-white bg-info mb-3">
                    <div class="card-body">
                        <h6 class="card-title"><i class="fas fa-book"></i> Subjects</h6>
                        <h2 id="totalSubjects">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-white bg-warning mb-3">
                    <div class="card-body">
                        <h6 class="card-title"><i class="fas fa-file-pdf"></i> Reports</h6>
                        <h2 id="totalReports">0</h2>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Quick Actions -->
        <div class="row mt-4">
            <div class="col-12">
                <div class="card shadow-sm">
                    <div class="card-header">
                        <h5><i class="fas fa-bolt"></i> Quick Actions</h5>
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-3">
                                <a href="admin-students.html" class="btn btn-outline-primary w-100 mb-2">
                                    <i class="fas fa-user-plus"></i> Manage Students
                                </a>
                            </div>
                            <div class="col-md-3">
                                <a href="admin-teachers.html" class="btn btn-outline-success w-100 mb-2">
                                    <i class="fas fa-user-tie"></i> Manage Teachers
                                </a>
                            </div>
                            <div class="col-md-3">
                                <a href="admin-subjects.html" class="btn btn-outline-info w-100 mb-2">
                                    <i class="fas fa-book"></i> Manage Subjects
                                </a>
                            </div>
                            <div class="col-md-3">
                                <a href="admin-pins.html" class="btn btn-outline-warning w-100 mb-2">
                                    <i class="fas fa-key"></i> Manage PINs
                                </a>
                            </div>
                            <div class="col-md-3">
                                <a href="admin-classes.html" class="btn btn-outline-warning w-100 mb-2">
                                    <i class="fas fa-key"></i> Manage Classes
                                </a>
                            </div>
                        </div>
                        <div class="row mt-2">
                            <div class="col-md-3">
                                <a href="admin-settings.html" class="btn btn-outline-secondary w-100 mb-2">
                                    <i class="fas fa-cog"></i> Settings
                                </a>
                            </div>
                            <div class="col-md-3">
                                <a href="admin-reports.html" class="btn btn-outline-danger w-100 mb-2">
                                    <i class="fas fa-file-alt"></i> Reports
                                </a>
                            </div>
                            <div class="col-md-3">
                                <a href="admin-classes.html" class="btn btn-outline-blue w-100 mb-2">
                                    <i class="fas fa-chart-pie"></i> Analytics
                                </a>
                            </div>
                            <div class="col-md-3">
                                <a href="admin-analytics.html" class="btn btn-outline-purple w-100 mb-2">
                                    <i class="fas fa-chart-pie"></i> Analytics
                                </a>
                            </div>
                            <div class="col-md-3">
                                <a href="#" class="btn btn-outline-dark w-100 mb-2" onclick="refreshData()">
                                    <i class="fas fa-sync"></i> Refresh
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/parent-api.js"></script>
    <script src="js/admin-dashboard.js"></script>
</body>
</html>
