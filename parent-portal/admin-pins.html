<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Manage PINs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .pin-status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .pin-status-active { background: #d4edda; color: #155724; }
        .pin-status-used { background: #fff3cd; color: #856404; }
        .pin-status-revoked { background: #f8d7da; color: #721c24; }
        .pin-status-expired { background: #e2e3e5; color: #383d41; }
        
        .pin-label {
            border: 1px dashed #ccc;
            padding: 15px;
            margin: 5px;
            border-radius: 8px;
            text-align: center;
            background: white;
        }
        .pin-label .pin-number {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 4px;
            color: #1a237e;
            font-family: 'Courier New', monospace;
        }
        .pin-label .student-name {
            font-weight: bold;
            font-size: 14px;
        }
        .pin-label .student-class {
            font-size: 12px;
            color: #666;
        }
        
        @media print {
            .no-print { display: none !important; }
            .pin-label { border: 1px solid #000 !important; page-break-inside: avoid; }
            .pin-label-container { padding: 10px; }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark no-print">
        <div class="container">
            <a class="navbar-brand" href="admin-dashboard.html">
                <i class="fas fa-school"></i> Admin Portal
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <span class="nav-link text-light">
                            <i class="fas fa-key"></i> Manage PINs
                        </span>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="adminLogout()">
                            <i class="fas fa-sign-out-alt"></i> Logout
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- Page Header -->
        <div class="row mb-4">
            <div class="col-md-8">
                <h2><i class="fas fa-key"></i> Manage PINs</h2>
                <p class="text-muted">Generate, manage, and distribute parent access PINs</p>
            </div>
            <div class="col-md-4 text-end">
                <button class="btn btn-success" onclick="printLabels()">
                    <i class="fas fa-print"></i> Print Labels
                </button>
                <button class="btn btn-primary" onclick="refreshData()">
                    <i class="fas fa-sync"></i> Refresh
                </button>
            </div>
        </div>

        <!-- Generate PINs Section -->
        <div class="card shadow-sm mb-4">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0"><i class="fas fa-plus-circle"></i> Generate PINs</h5>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-4">
                        <label class="form-label">Select Class</label>
                        <select class="form-select" id="pinClassSelect">
                            <option value="">Select Class...</option>
                            <option value="Nursery A">Nursery A</option>
                            <option value="Nursery B">Nursery B</option>
                            <option value="Year 1">Year 1</option>
                            <option value="Year 2">Year 2</option>
                            <option value="Year 3">Year 3</option>
                            <option value="Year 4">Year 4</option>
                            <option value="Year 5">Year 5</option>
                            <option value="Year 6">Year 6</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Term</label>
                        <select class="form-select" id="pinTermSelect">
                            <option value="Term1">Term 1</option>
                            <option value="Term2">Term 2</option>
                            <option value="Term3" selected>Term 3</option>
                        </select>
                    </div>
                    <div class="col-md-4 d-flex align-items-end">
                        <button class="btn btn-success w-100" onclick="generatePins()">
                            <i class="fas fa-key"></i> Generate PINs
                        </button>
                    </div>
                </div>
                <div id="generateResult" class="mt-3"></div>
            </div>
        </div>

        <!-- PIN Statistics -->
        <div class="row mb-4">
            <div class="col-md-3">
                <div class="card text-white bg-primary">
                    <div class="card-body">
                        <h6 class="card-title"><i class="fas fa-key"></i> Total PINs</h6>
                        <h2 id="totalPins">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-white bg-success">
                    <div class="card-body">
                        <h6 class="card-title"><i class="fas fa-check-circle"></i> Active</h6>
                        <h2 id="activePins">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-white bg-warning">
                    <div class="card-body">
                        <h6 class="card-title"><i class="fas fa-history"></i> Used</h6>
                        <h2 id="usedPins">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-white bg-danger">
                    <div class="card-body">
                        <h6 class="card-title"><i class="fas fa-ban"></i> Revoked</h6>
                        <h2 id="revokedPins">0</h2>
                    </div>
                </div>
            </div>
        </div>

        <!-- PIN List -->
        <div class="card shadow-sm">
            <div class="card-header">
                <h5 class="mb-0"><i class="fas fa-list"></i> PIN List</h5>
            </div>
            <div class="card-body">
                <!-- Filter -->
                <div class="row mb-3">
                    <div class="col-md-4">
                        <label class="form-label">Filter by Class</label>
                        <select class="form-select" id="pinFilterClass" onchange="loadPins()">
                            <option value="">All Classes</option>
                            <option value="Nursery A">Nursery A</option>
                            <option value="Nursery B">Nursery B</option>
                            <option value="Year 1">Year 1</option>
                            <option value="Year 2">Year 2</option>
                            <option value="Year 3">Year 3</option>
                            <option value="Year 4">Year 4</option>
                            <option value="Year 5">Year 5</option>
                            <option value="Year 6">Year 6</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Filter by Status</label>
                        <select class="form-select" id="pinFilterStatus" onchange="loadPins()">
                            <option value="">All Status</option>
                            <option value="Active">Active</option>
                            <option value="Used">Used</option>
                            <option value="Revoked">Revoked</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Search</label>
                        <input type="text" class="form-control" id="pinSearchInput" 
                               placeholder="Search by name or PIN..." oninput="loadPins()">
                    </div>
                </div>

                <!-- Table -->
                <div class="table-responsive">
                    <table class="table table-hover" id="pinsTable">
                        <thead class="table-dark">
                            <tr>
                                <th>#</th>
                                <th>Student ID</th>
                                <th>Student Name</th>
                                <th>Class</th>
                                <th>PIN</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="pinsBody">
                            <tr>
                                <td colspan="7" class="text-center">
                                    <i class="fas fa-spinner fa-spin"></i> Loading PINs...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Print Labels Modal -->
        <div class="modal fade" id="printLabelsModal" tabindex="-1">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Print PIN Labels</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div id="labelsContainer" class="pin-label-container">
                            <div class="text-center py-3">
                                <i class="fas fa-spinner fa-spin"></i> Loading labels...
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                        <button type="button" class="btn btn-primary" onclick="window.print()">
                            <i class="fas fa-print"></i> Print Labels
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 9999;">
        <div id="toastMessage" class="toast align-items-center text-white border-0" role="alert">
            <div class="d-flex">
                <div class="toast-body" id="toastBody"></div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/parent-api.js"></script>
    <script src="js/admin-pins.js"></script>
</body>
</html>
