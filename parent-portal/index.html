<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parent Portal - Report Checker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="row justify-content-center min-vh-100 align-items-center">
            <div class="col-md-5">
                <div class="card shadow-lg border-0">
                    <div class="card-body p-5">
                        <!-- School Logo -->
                        <div class="text-center mb-4">
                            <div class="school-logo">
                                <i class="fas fa-school fa-3x text-primary"></i>
                            </div>
                            <h3 class="mt-3 school-name">L'école Peniel</h3>
                            <p class="text-muted small motto">Grooming the total child</p>
                        </div>
                        
                        <!-- Header -->
                        <div class="text-center mb-4">
                            <h4 class="fw-bold">📋 Report Checker</h4>
                            <p class="text-muted small">Enter your PIN to access your child's report</p>
                        </div>
                        
                        <!-- PIN Form -->
                        <form id="pinForm">
                            <!-- Class Selection -->
                            <div class="mb-3">
                                <label for="classSelect" class="form-label fw-semibold">
                                    <i class="fas fa-users"></i> Select Class
                                </label>
                                <select class="form-select form-select-lg" id="classSelect" required>
                                    <option value="">Select your child's class...</option>
                                    <option value="Nursery A">Nursery A</option>
                                    <option value="Nursery B">Nursery B</option>
                                    <option value="Year 1">Year 1</option>
                                    <option value="Year 2">Year 2</option>
                                    <option value="Year 3">Year 3</option>
                                    <option value="Year 4">Year 4</option>
                                    <option value="Year 5">Year 5</option>
                                    <option value="Year 6">Year 6</option>
                                </select>
                            </div>
                            
                            <!-- PIN Input -->
                            <div class="mb-3">
                                <label for="pinInput" class="form-label fw-semibold">
                                    <i class="fas fa-key"></i> Enter PIN
                                </label>
                                <div class="pin-input-group">
                                    <input type="password" class="form-control form-control-lg text-center" 
                                           id="pinInput" placeholder="Enter 6-digit PIN" 
                                           maxlength="6" pattern="[0-9]{6}" required>
                                    <button type="button" class="btn btn-outline-secondary" id="togglePin">
                                        <i class="fas fa-eye" id="pinToggleIcon"></i>
                                    </button>
                                </div>
                                <div id="pinHelp" class="form-text">
                                    <i class="fas fa-info-circle"></i> PIN is 6 digits (e.g., 482719)
                                </div>
                            </div>
                            
                            <!-- Submit Button -->
                            <button type="submit" class="btn btn-primary btn-lg w-100" id="loginBtn">
                                <span id="loginText"><i class="fas fa-sign-in-alt"></i> View Report</span>
                                <span id="loginSpinner" class="spinner-border spinner-border-sm d-none"></span>
                            </button>
                        </form>
                        
                        <!-- Error Message -->
                        <div id="errorMessage" class="alert alert-danger mt-3 d-none">
                            <i class="fas fa-exclamation-circle"></i>
                            <span id="errorText"></span>
                        </div>
                        
                        <!-- Footer -->
                        <div class="text-center mt-4">
                            <small class="text-muted">
                                <i class="fas fa-lock"></i> Secure access • Contact school for PIN
                            </small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Include Scripts -->
    <script src="js/config.js"></script>
    <script src="js/parent-api.js"></script>
    <script src="js/parent-login.js"></script>
</body>
</html>
