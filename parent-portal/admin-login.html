<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="row justify-content-center min-vh-100 align-items-center">
            <div class="col-md-4">
                <div class="card shadow-lg border-0">
                    <div class="card-body p-4">
                        <div class="text-center mb-4">
                            <i class="fas fa-user-shield fa-3x text-primary"></i>
                            <h4 class="mt-3">Admin Portal</h4>
                            <p class="text-muted small">Enter your credentials to continue</p>
                        </div>
                        
                        <form id="adminLoginForm">
                            <div class="mb-3">
                                <label class="form-label">Username</label>
                                <input type="text" class="form-control" id="adminUsername" 
                                       placeholder="admin@school.com" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <input type="password" class="form-control" id="adminPassword" 
                                       placeholder="••••••••" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100" id="adminLoginBtn">
                                <span id="adminLoginText">Login</span>
                                <span id="adminLoginSpinner" class="spinner-border spinner-border-sm d-none"></span>
                            </button>
                        </form>
                        
                        <div id="adminError" class="alert alert-danger mt-3 d-none">
                            <i class="fas fa-exclamation-circle"></i>
                            <span id="adminErrorText">Invalid credentials</span>
                        </div>
                        
                        <div class="text-center mt-3">
                            <a href="index.html" class="text-decoration-none small">
                                <i class="fas fa-arrow-left"></i> Parent Portal
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="js/config.js"></script>
    <script src="js/parent-api.js"></script>
    <script src="js/admin-login.js"></script>
</body>
</html>
