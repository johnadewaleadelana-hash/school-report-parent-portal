<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Report Card</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Print Styles */
        @media print {
            body { background: white; }
            .no-print { display: none !important; }
            .report-container { box-shadow: none !important; margin: 0 !important; padding: 0 !important; }
            .grade-badge { border: 1px solid #ccc; }
            .watermark { opacity: 0.1 !important; }
        }
    </style>
</head>
<body>
    <!-- Navigation (Hidden on Print) -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary no-print">
        <div class="container">
            <a class="navbar-brand" href="parent-dashboard.html">
                <i class="fas fa-arrow-left"></i> Back
            </a>
            <span class="navbar-text text-white">
                <i class="fas fa-file-pdf"></i> Report Card
            </span>
            <div>
                <button class="btn btn-light btn-sm me-2" onclick="window.print()">
                    <i class="fas fa-print"></i> Print
                </button>
                <button class="btn btn-success btn-sm" onclick="downloadPDF()">
                    <i class="fas fa-download"></i> PDF
                </button>
            </div>
        </div>
    </nav>
    
    <div class="container mt-3">
        <div class="report-container" id="reportContainer">
            <!-- Report content will be loaded here -->
            <div class="text-center py-5">
                <i class="fas fa-spinner fa-spin fa-3x text-primary"></i>
                <p class="mt-3">Loading report...</p>
            </div>
        </div>
    </div>
    
    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/parent-api.js"></script>
    <script src="js/parent-report.js"></script>
</body>
</html>
